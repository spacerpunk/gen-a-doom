<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Doom Music</title>
    <style>
        body { font-family: sans-serif; background-color: #333; color: #fff; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        #controls { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; padding: 20px; background-color: #444; border-radius: 8px; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; background-color: #c00; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #e00; }
        label { margin-right: 10px; }
        input[type="range"] { width: 200px; }
        .control-group { display: flex; align-items: center; margin-bottom: 10px;}
    </style>
</head>
<body>
    <h1>Generative Doom Music</h1>
    <div id="controls">
        <button id="startStopButton">Start</button>
        <div class="control-group">
            <label for="tempoSlider">Tempo:</label>
            <input type="range" id="tempoSlider" min="60" max="180" value="120">
            <span id="tempoValue">120 BPM</span>
        </div>
        <!-- More controls will be added here -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="main.js" defer></script>
</body>
</html>
